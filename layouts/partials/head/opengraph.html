<script type="application/ld+json">
{
    "@context" : "http://schema.org",
    "@type" : "BlogPosting",
    "mainEntityOfPage": {
         "@type": "WebPage",
         "@id": "{{ .Site.BaseURL }}"
    },
    "articleSection" : "{{ .Section }}",
    "name" : "{{ .Title }}",
    "headline" : "{{ .Title }}",
    "description" : "{{ if .Description }}{{ .Description }}{{ else }}{{if .IsPage}}{{ .Summary }}{{ end }}{{ end }}",
    "inLanguage" : "en-US",
    "author" : "{{ .Site.Params.name }}",
    "creator" : "{{ .Site.Params.name }}",
    "publisher": "{{ .Site.Params.name }}",
    "accountablePerson" : "{{ .Site.Params.name }}",
    "copyrightHolder" : "{{ .Site.Params.name }}",
    "copyrightYear" : "{{ .Date.Format "2006" }}",
    "datePublished": "{{ .Date }}",
    "dateModified" : "{{ .Date }}",
    "url" : "{{ .Permalink }}",
    "wordCount" : "{{ .WordCount }}",
    "keywords" : [ {{ if isset .Params "tags" }}{{ range .Params.tags }}"{{ . }}",{{ end }}{{ end }} ]
}
</script>
<link rel="me" href="https://twitter.com/{{ .Site.Params.twitter}}">


 <!-- Facebook Meta Tags -->
 <meta property="og:url" content="https://chicago.harperreed.com">
 <meta property="og:type" content="website">
 <meta property="og:title" content="{{ .Title }}">
 <meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{if .IsPage}}{{ .Summary }}{{ end }}{{ end }}">
 <meta property="og:image" content="https://chicago.harperreed.com/og.png">

 <!-- Twitter Meta Tags -->
 <meta name="twitter:card" content="summary_large_image">
 <meta property="twitter:domain" content="chicago.harperreed.com">
 <meta property="twitter:url" content="https://chicago.harperreed.com">
 <meta name="twitter:title" content="{{ .Title }}">
 <meta name="twitter:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{if .IsPage}}{{ .Summary }}{{ end }}{{ end }}">
 <meta name="twitter:image" content="https://chicago.harperreed.com/og.png">
